spring.application.name=JobApplication
server.port=8080

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/bolsa_empleo_p2?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=MiClaveSecretaSuperSeguraParaJWTde256Bits!!
jwt.expiration-ms=86400000

# Subida de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# App
app.name=Bolsa de Empleo