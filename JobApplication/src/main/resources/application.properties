spring.application.name=JobApplication
server.port=8080

# ── Base de datos PostgreSQL ──────────────────────────────────────────────────
# Cambiá "localhost:5432/bolsa_empleo_p2" si tu Postgres corre en otro puerto o
# si querés otro nombre de base de datos. El usuario y contraseña también.
spring.datasource.url=jdbc:postgresql://localhost:5432/bolsa_empleo_p2
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# "update"  → Hibernate crea/actualiza las tablas automáticamente al arrancar.
# Cambiarlo a "create-drop" si querés empezar con la BD limpia cada vez.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
# Debe tener al menos 32 caracteres (256 bits) para HMAC-SHA256
jwt.secret=MiClaveSecretaSuperSeguraParaJWTde256Bits!!
jwt.expiration-ms=86400000

# ── Subida de archivos (CV en PDF) ────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── App ───────────────────────────────────────────────────────────────────────
app.name=Bolsa de Empleo Empleo